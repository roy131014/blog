name: Deploy Jamstack Blog

on:
  workflow_dispatch: # 수동 빌드 버튼 활성화

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 소스코드 가져오기 (최신 Node 버전 강제 적용 플래그 추가)
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # 2. Node.js 환경 구축 (최신 24 버전으로 상향)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 3. 필요한 도구 설치
      - name: Install Dependencies
        run: npm install

      # 4. 정적 HTML 파일 조립하기 (내 데이터베이스 정보 연동)
      - name: Build Static HTML
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # 5. 완성된 dist 폴더를 gh-pages 브랜치로 안전하게 전송
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
